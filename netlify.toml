[build]
  publish = "."
  functions = "netlify/functions"

# Redirect /app to the FinanceOS app
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

# Paddle webhook endpoint
[[redirects]]
  from = "/api/paddle-webhook"
  to = "/.netlify/functions/paddle-webhook"
  status = 200
[[redirects]]
  from = "https://getfinanceos.netlify.app/*"
  to = "https://www.gofinanceos.com/:splat"
  status = 301
  force = true
